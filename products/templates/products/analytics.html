<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Analytics Dashboard</title>
</head>

<body>
    <h1>Category Analytics Dashboard</h1>

    <table border="1">
        <tr>
            <th>Category</th>
            <th>Products</th>
            <th>Avg Price</th>
            <th>Total Stock</th>
            <th>Price Range</th>
        </tr>
        {% for cat in categories %}
        <tr>
            <td>{{ cat.name }}</td>
            <td>{{ cat.product_count }}</td>
            <td>${{ cat.avg_price|floatformat:2 }}</td>
            <td>{{ cat.total_stock }}</td>
            <td>${{ cat.min_price }} - ${{ cat.max_price }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5">No categories found.</td>
        </tr>
        {% endfor %}
    </table>

</body>

</html>
